<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --card-bg: rgba(17, 24, 39, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --error: #ef4444;
      --success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
      bottom: -150px;
      left: -150px;
      pointer-events: none;
    }

    .form-container {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2.5rem;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      z-index: 10;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .header-tag {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.85rem 1rem;
      font-size: 0.9375rem;
      border-radius: 12px;
      outline: none;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.95rem;
      font-size: 0.9375rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 0.85rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      line-height: 1.4;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <div class="header">
      <span class="header-tag">Control Center</span>
      <h1>Admin Gateway</h1>
      <p>Secure system access for Moegamat Samsodien's portfolio</p>
    </div>

    <div id="error-alert" class="alert alert-error">Invalid administrator credentials.</div>
    <div id="success-alert" class="alert alert-success">Signature Verified. Redirecting...</div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" required placeholder="name@example.com" value="rashaadsm2004@gmail.com">
      </div>

      <div class="form-group">
        <label for="password">Security Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" id="submit-btn" class="login-btn">
        <span class="spinner" id="btn-spinner"></span>
        <span id="btn-text">Authenticate</span>
      </button>
    </form>

    <div class="footer">
      <a href="/">← Return to Public Portfolio</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const spinner = document.getElementById('btn-spinner');
    const btnText = document.getElementById('btn-text');
    const errorAlert = document.getElementById('error-alert');
    const successAlert = document.getElementById('success-alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset alerts
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) return;

      // UX states
      submitBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.innerText = 'Verifying...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          const data = await response.json();
          
          // Save credentials in local storage to sustain session
          localStorage.setItem('portfolio:token', data.token);
          localStorage.setItem('portfolio:user', JSON.stringify(data.user));

          // Success notification and redirect
          successAlert.style.display = 'block';
          btnText.innerText = 'Granted';
          spinner.style.display = 'none';
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1200);
        } else {
          const errData = await response.json();
          showError(errData.error || 'Authentication rejected.');
        }
      } catch (err) {
        showError('Network connectivity failure. Make sure server is running.');
      }
    });

    function showError(msg) {
      errorAlert.innerText = msg;
      errorAlert.style.display = 'block';
      submitBtn.disabled = false;
      spinner.style.display = 'none';
      btnText.innerText = 'Authenticate';
    }
  </script>
</body>
</html>
